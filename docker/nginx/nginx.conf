worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    root /usr/share/nginx/html;

    # Map for WebSocket upgrade connection header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =============================================
    # OpenRMM Main Application - openrmm.derfwins.com
    # =============================================
    server {
        listen 80;
        server_name openrmm.derfwins.com;

        # Docker DNS resolver — re-resolves every 30s so backend
        # container recreations don't cause stale 502 errors
        resolver 127.0.0.11 valid=30s;

        # Variable forces dynamic DNS resolution on every request
        set $backend http://backend:8000;

        client_max_body_size 100M;

        # ---- Auth API ----
        location /v2/ {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- Backend WebSocket ----
        location /ws/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ---- Desktop WebSocket ----
        location /ws/desktop/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ---- Health check ----
        location = /health/ {
            proxy_pass $backend/health/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # ---- API Proxy ----
        location ~ ^/(agents|alerts|scripts|clients|sites|checks|core|software|winupdate|accounts|monitoring|audit|packages|desktop)/(.+)$ {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/(agents|alerts|scripts|clients|sites|checks|core|software|winupdate|accounts|monitoring|audit|packages|desktop)/$ {
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Static Assets ----
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- SPA Catch-All ----
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
