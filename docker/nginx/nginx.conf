user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    root /usr/share/nginx/html;

    # Backend upstream
    upstream backend_servers {
        server backend:8000;
    }

    # Guacamole upstream
    upstream guacamole_servers {
        server guacamole:8080;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # ---- Auth API (always proxied - unique prefix) ----
        location /v2/ {
            proxy_pass http://backend_servers/v2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- WebSocket ----
        location /ws/ {
            proxy_pass http://backend_servers/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ---- Health check ----
        location = /health/ {
            proxy_pass http://backend_servers/health/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Guacamole ----
        location /guacamole/ {
            proxy_pass http://guacamole_servers/guacamole/;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_cookie_path /guacamole/ /guacamole/;
        }

        location /guacamole/websocket-tunnel {
            proxy_pass http://guacamole_servers/guacamole/websocket-tunnel;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # ---- Static Assets ----
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- API Proxy (catch-all for backend API paths with sub-resources) ----
        location ~ ^/(agents|alerts|scripts|clients|sites|checks|core|software|winupdate|accounts|monitoring|audit|meshcentral)/(.+)$ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy root-level API list endpoints (with trailing slash + optional query string)
        location ~ ^/(agents|alerts|scripts|clients|sites|checks|core|software|winupdate|accounts|monitoring|audit|meshcentral)/$ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- SPA Catch-All ----
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}