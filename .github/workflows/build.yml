name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Nightly builds at 2 AM UTC

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd api/tacticalrmm
          python manage.py test --verbosity=2
      
      - name: Build Docker image
        run: |
          docker build -t openrmm-backend:${{ github.sha }} ./api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Lint
        run: |
          cd frontend
          npm run lint
      
      - name: Build
        run: |
          cd frontend
          npm run build
      
      - name: Test
        run: |
          cd frontend
          npm run test

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build agent
        run: |
          cd api/tacticalrmm/agents
          go build -o agent-linux
          GOOS=windows GOARCH=amd64 go build -o agent-windows.exe
          GOOS=darwin GOARCH=amd64 go build -o agent-macos

  notify:
    needs: [backend, frontend, agent]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: OpenRMM Build Status - ${{ github.ref }}
          to: fred@derfwins.com
          from: OpenRMM CI
          body: |
            Build completed for OpenRMM
            
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Status: ${{ needs.backend.result == 'success' && needs.frontend.result == 'success' && needs.agent.result == 'success' && 'SUCCESS' || 'FAILED' }}
            
            Check details at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
