# OpenRMM Docker Compose Configuration
# Development and Production Setup

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openrmm-postgres
    environment:
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrmm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openrmm-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NATS Message Queue (for agent communication)
  nats:
    image: nats:2-alpine
    container_name: openrmm-nats
    command: "-m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Django Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openrmm-backend
    environment:
      DJANGO_SETTINGS_MODULE: tacticalrmm.settings
      DB_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
      SECRET_KEY: ${SECRET_KEY:-openrmm_dev_secret_key_2026_change_me}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DOCKER_BUILD: "False"
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      NATS_HOST: nats
      MESH_USERNAME: admin
      MESH_SITE: "http://10.10.0.122"
      MESH_TOKEN_KEY: "devkey1234567890abcdef1234567890abcdef1234567890abcdef1234567890ab"
    volumes:
      - ./api/tacticalrmm:/app/tacticalrmm
      - static_files:/app/static
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py createsuperuser --noinput --username admin --email admin@openrmm.local || true &&
             gunicorn tacticalrmm.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openrmm-frontend
    environment:
      VITE_API_URL: http://10.10.0.122:8000
      VITE_WS_URL: ws://10.10.0.122:8000/ws
      VITE_GUACAMOLE_API_URL: http://10.10.0.122:8080
      VITE_GUACAMOLE_PROXY_URL: wss://10.10.0.122:8443
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    restart: unless-stopped

  # Guacamole Remote Desktop Gateway
  guacd:
    image: guacamole/guacd:latest
    container_name: openrmm-guacd
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:latest
    container_name: openrmm-guacamole
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: postgres
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: openrmm
      MYSQL_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
    ports:
      - "8080:8080"
    depends_on:
      - guacd
      - postgres
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openrmm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - backend
      - frontend
      - guacamole
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  static_files:
  media_files:

networks:
  default:
    name: openrmm-network