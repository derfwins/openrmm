services:
  postgres:
    image: postgres:15-alpine
    container_name: openrmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: openrmm_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - openrmm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrmm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openrmm-redis
    restart: unless-stopped
    networks:
      - openrmm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: openrmm-nats
    restart: unless-stopped
    command: "-m 8222 -js"
    networks:
      - openrmm-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: ./api
    container_name: openrmm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://openrmm:openrmm_secret@postgres:5432/openrmm
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      NATS_URL: nats://nats:4222
      SECRET_KEY: openrmm-secret-key-change-in-production
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
    volumes:
      - ./agent:/app/agent:ro
    command: ["uvicorn", "v2.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - openrmm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./api
    container_name: openrmm-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://openrmm:openrmm_secret@postgres:5432/openrmm
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      NATS_URL: nats://nats:4222
      SECRET_KEY: openrmm-secret-key-change-in-production
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
    command: ["celery", "-A", "v2.celery", "worker", "--loglevel=info"]
    networks:
      - openrmm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./api
    container_name: openrmm-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://openrmm:openrmm_secret@postgres:5432/openrmm
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      NATS_URL: nats://nats:4222
      SECRET_KEY: openrmm-secret-key-change-in-production
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "False"
    command: ["celery", "-A", "v2.celery", "beat", "--loglevel=info"]
    networks:
      - openrmm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: openrmm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - openrmm-network
    depends_on:
      - backend

networks:
  openrmm-network:
    name: openrmm-network

volumes:
  postgres_data:
    driver: local