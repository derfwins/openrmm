services:
  postgres:
    image: postgres:15-alpine
    container_name: openrmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: openrmm_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openrmm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrmm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openrmm-redis
    restart: unless-stopped
    networks:
      - openrmm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: openrmm-nats
    restart: unless-stopped
    networks:
      - openrmm-network
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: "-m 8222 -js"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./api
    container_name: openrmm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://openrmm:openrmm_secret@postgres:5432/openrmm
      REDIS_URL: redis://redis:***@postgres:5432/openrmm
      REDIS_URL: redis://redis:***@postgres:5432/openrmm
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      NATS_URL: nats://nats:4222
      SECRET_KEY: openrmm-secret-key-change-in-production
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    networks:
      - openrmm-network
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "v2.celery", "beat", "--loglevel=info"]

  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    container_name: openrmm-meshcentral
    restart: unless-stopped
    environment:
      MESHHOST: rmmapp.derfwins.com
    networks:
      - openrmm-network
    volumes:
      - ./meshcentral/data:/opt/meshcentral/meshcentral-data
      - ./meshcentral/config.json:/opt/meshcentral/meshcentral-data/config.json:ro
      - ./meshcentral/custom.css:/opt/meshcentral/meshcentral-data/custom.css:ro
      - ./meshcentral/logo.svg:/opt/meshcentral/meshcentral-data/logo.svg:ro
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: openrmm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - openrmm-network
    depends_on:
      - backend
      - meshcentral

  # Apache Guacamole - Remote Desktop Gateway (kept for potential future use)
  guacd:
    image: guacamole/guacd:latest
    container_name: openrmm-guacd
    restart: unless-stopped
    networks:
      - openrmm-network
    volumes:
      - guacd_drive:/drive
      - guacd_record:/record

  guacamole:
    image: guacamole/guacamole:latest
    container_name: openrmm-guacamole
    restart: unless-stopped
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      POSTGRES_HOSTNAME: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: guacamole_db
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: guacamole_secret
    networks:
      - openrmm-network
    depends_on:
      - guacd
      - postgres
    volumes:
      - guacamole_config:/config

networks:
  openrmm-network:
    name: openrmm-network

volumes:
  postgres_data:
    driver: local
  guacd_drive:
    driver: local
  guacd_record:
    driver: local
  guacamole_config:
    driver: local