# OpenRMM Docker Compose Configuration
# Development and Production Setup

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openrmm-postgres
    environment:
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrmm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openrmm-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS Message Queue
  nats:
    image: nats:2-alpine
    container_name: openrmm-nats
    command: "-m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openrmm-backend
    environment:
      DJANGO_SETTINGS_MODULE: tacticalrmm.settings
      DB_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
      DATABASE_URL: postgres://openrmm:${DB_PASSWORD:-openrmm_dev_2026}@postgres:5432/openrmm
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      SECRET_KEY: ${SECRET_KEY:-openrmm_dev_secret_key_2026_change_me}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py createsuperuser --noinput --username admin --email admin@openrmm.local || true &&
             gunicorn tacticalrmm.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openrmm-frontend
    environment:
      VITE_API_URL: http://10.10.0.122:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openrmm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/var/www/static
      - media_files:/var/www/media
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  nats_data:
  static_files:
  media_files:

networks:
  default:
    name: openrmm-network