# OpenRMM Docker Compose Configuration
# Custom FastAPI Backend + React Frontend + Guacamole

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: openrmm-postgres
    environment:
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openrmm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openrmm-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NATS Message Queue (for agent communication)
  nats:
    image: nats:2-alpine
    container_name: openrmm-nats
    command: "-m 8222"
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openrmm-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY:-openrmm_dev_secret_key_2026_change_me}
      DEBUG: "True"
      CORS_ORIGINS: '["http://localhost:5173","http://10.10.0.122:5173","http://10.10.0.122:8000","http://10.10.0.122","http://rmmapp.derfwins.com","https://rmmapp.derfwins.com","http://rmm.derfwins.com","https://rmm.derfwins.com"]'
    volumes:
      - ./api/v2:/app/v2
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn v2.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openrmm-frontend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ws://10.10.0.122:8000/ws
      VITE_GUACAMOLE_API_URL: http://10.10.0.122:8080
      VITE_GUACAMOLE_PROXY_URL: wss://10.10.0.122:8443
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    command: npm run dev -- --host
    depends_on:
      - backend
    restart: unless-stopped

  # Guacamole Remote Desktop Gateway
  guacd:
    image: guacamole/guacd:latest
    container_name: openrmm-guacd
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:latest
    container_name: openrmm-guacamole
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: postgres
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: openrmm
      MYSQL_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - guacd
      - postgres
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openrmm-celery-worker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY:-openrmm_dev_secret_key_2026_change_me}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A v2.celery worker -l INFO
    restart: unless-stopped

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: openrmm-celery-beat
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: openrmm
      POSTGRES_USER: openrmm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openrmm_dev_2026}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY:-openrmm_dev_secret_key_2026_change_me}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A v2.celery beat -l INFO
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openrmm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
      - guacamole
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  default:
    name: openrmm-network